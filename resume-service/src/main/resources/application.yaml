spring:
  application:
    name: resume-service

  datasource:
    url: jdbc:mysql://localhost:3306/resume?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

  ai:
    vertex:
      ai:
        gemini:
          project-id: resums
          location: us-central1
          api-key: keys
          model: gemini-2.5-flash
          timeout: 30s

  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.s3.autoconfigure.S3VectorStoreAutoConfiguration

# AWS S3 Configuration
aws:
  s3:
    region: eu-north-1
    bucket-name: stores
    access-key:
    secret-key:

# Logging Configuration
logging:
  level:
    com.cvservice: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.web: DEBUG
    org.apache.catalina: DEBUG