spring:
  application:
    name: resume-service

  datasource:
    url: jdbc:mysql://localhost:3306/resume?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  ai:
    google:
      api-key: ${GOOGLE_AI_API_KEY:your-google-ai-api-key-here}
      model: gemini-1.5-flash
      timeout: 30s
      url: https://generativelanguage.googleapis.com/v1beta

  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.vectorstore.s3.autoconfigure.S3VectorStoreAutoConfiguration

# AWS S3 Configuration
aws:
  s3:
    region: ${AWS_REGION:us-east-1}
    bucket-name: ${S3_BUCKET_NAME:your-resume-bucket}
    access-key: ${AWS_ACCESS_KEY:your-aws-access-key}
    secret-key: ${AWS_SECRET_KEY:your-aws-secret-key}