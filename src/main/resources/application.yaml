spring:
  application:
    name: resume-service

  datasource:
    url: jdbc:mysql://localhost:3306/resume?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

  ai:
    vertex:
      ai:
        gemini:
          project-id: ${GOOGLE_CLOUD_PROJECT_ID:test-project}
          location: ${GOOGLE_CLOUD_LOCATION:us-central1}
          api-key: ${GOOGLE_AI_API_KEY:test-api-key}
          model: gemini-1.5-flash
          timeout: 30s

  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.s3.autoconfigure.S3VectorStoreAutoConfiguration

# AWS S3 Configuration
aws:
  s3:
    region: ${AWS_REGION:us-east-1}
    bucket-name: ${S3_BUCKET_NAME:your-resume-bucket}
    access-key: ${AWS_ACCESS_KEY:your-aws-access-key}
    secret-key: ${AWS_SECRET_KEY:your-aws-secret-key}

# Logging Configuration
logging:
  level:
    com.cvservice: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.web: DEBUG
    org.apache.catalina: DEBUG